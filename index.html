<!DOCTYPE html>
<html>
<head>
  <title>ระบบคีย์หวย</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; text-align:center;}
    input, button { padding:10px; margin:5px; border-radius:5px; border:none;}
    button { background:orange; color:#000; }
    .box { margin-top:20px; }
  </style>
</head>
<body>

<h1>ระบบคีย์หวย</h1>

<div id="login">
  <h3>เข้าสู่ระบบ</h3>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <h3>คีย์เลข</h3>
  <input id="number" placeholder="เลข"><br>
  <input id="type" placeholder="ประเภท (3ตัว/2ตัว/วิ่ง)"><br>
  <button onclick="add()">บันทึก</button>

  <div class="box">
    <h3>รายการ</h3>
    <ul id="list"></ul>
  </div>
</div>

<script>
let data = [];

function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u==="admin" && p==="1234"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
  }else{
    alert("ผิด");
  }
}

function add(){
  let num = document.getElementById("number").value;
  let type = document.getElementById("type").value;
  let amount = document.getElementById("amount").value;

  // ตรวจตัวเลข
  if(!/^[0-9]+$/.test(num)){
    alert("กรอกได้เฉพาะตัวเลข!");
    return;
  }

  // ตรวจความยาว
  if(type === "2ตัว" && num.length !== 2){
    alert("ต้องเป็นเลข 2 ตัว");
    return;
  }

  if(type === "3ตัว" && num.length !== 3){
    alert("ต้องเป็นเลข 3 ตัว");
    return;
  }

  if(!amount || amount <= 0){
    alert("ใส่จำนวนเงินให้ถูกต้อง");
    return;
  }

  // 🔥 เช็คเลขซ้ำ
  let duplicate = data.find(d => d.num === num && d.type === type);
  if(duplicate){
    let confirmAdd = confirm("เลขนี้มีแล้ว!\nต้องการเพิ่มซ้ำไหม?");
    if(!confirmAdd) return;
  }

  // 🔥 ยืนยันก่อนบันทึก
  let confirmSave = confirm(
    ยืนยันรายการ\n\nเลข: ${num}\nประเภท: ${type}\nจำนวนเงิน: ${amount} บาท
  );

  if(!confirmSave) return;

  // บันทึก
  data.push({num, type, amount});
  render();

  // ล้างค่า
  document.getElementById("number").value = "";
  document.getElementById("amount").value = "";
}
</script>
</body>
</html>
